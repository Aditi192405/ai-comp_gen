
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Form</title>
    <meta name="description" content="A modern, animated, and responsive login form UI component built with HTML and Tailwind CSS.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes backgroundPan {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .animate-fadeInScale {
            animation: fadeInScale 0.6s ease-out forwards;
        }
        .animate-backgroundPan {
            animation: backgroundPan 15s ease-in-out infinite;
            background-size: 200% 200%;
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-900 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 animate-backgroundPan">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 md:p-10 w-full max-w-md relative overflow-hidden animate-fadeInScale">

            <div class="absolute top-0 right-0 -mr-4 -mt-4 w-24 h-24 bg-gradient-to-br from-indigo-400 to-purple-400 rounded-full opacity-30 transform rotate-45"></div>
            <div class="absolute bottom-0 left-0 -ml-4 -mb-4 w-32 h-32 bg-gradient-to-tl from-pink-300 to-red-300 rounded-full opacity-20 transform -rotate-30"></div>

            <h1 class="text-4xl font-extrabold text-center text-gray-800 mb-8 tracking-tight leading-tight">
                Welcome Back!
            </h1>

            <form action="#" method="POST" aria-label="Login Form">
                <div class="mb-6">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your@example.com"
                        required
                        autocomplete="email"
                        class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300 ease-in-out placeholder-gray-400 hover:border-indigo-400"
                    >
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-300 ease-in-out placeholder-gray-400 hover:border-indigo-400"
                    >
                </div>

                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember_me" name="remember_me" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="remember_me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                    </div>
                    <a href="#" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200 ease-in-out">
                        Forgot Password?
                    </a>
                </div>

                <div>
                    <button
                        type="submit"
                        class="w-full py-4 px-6 bg-gradient-to-r from-indigo-600 to-purple-700 text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                    >
                        Login
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600">
                    Don't have an account?
                    <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200 ease-in-out">
                        Sign Up
                    </a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
